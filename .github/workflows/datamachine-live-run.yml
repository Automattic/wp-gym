name: Data Machine Live Task Run

on:
  workflow_dispatch:
    inputs:
      task_set:
        description: Task set to run when task_ids is empty.
        required: true
        default: first-live-run
        type: choice
        options:
          - first-live-run
          - benchmark-readiness-pilot
          - smoke
          - all
          - custom
      task_ids:
        description: Optional comma-separated task IDs. Overrides task_set.
        required: false
        default: ""
        type: string
      bundle_ref:
        description: Optional wp-gym ref containing bundles/datamachine-task-runner.
        required: false
        default: ""
        type: string
      dry_run:
        description: Build the runner config without making live model calls.
        required: true
        default: true
        type: boolean
      attempts_per_model:
        description: Number of repeated attempts to run for each task/model row.
        required: true
        default: 1
        type: number
      large_n_min_attempts:
        description: Minimum retained attempts per model tier before the large-N report can mark the threshold met.
        required: true
        default: 30
        type: number
permissions:
  actions: read
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: wp-gym-live-${{ github.ref }}-${{ inputs.task_set }}-${{ inputs.task_ids }}-${{ inputs.attempts_per_model }}
  cancel-in-progress: false

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install validation dependencies
        run: npm ci

      - name: Resolve task and provider matrix
        id: matrix
        env:
          TASK_SET: ${{ inputs.task_set }}
          TASK_IDS: ${{ inputs.task_ids }}
          ATTEMPTS_PER_MODEL: ${{ inputs.attempts_per_model }}
        run: |
          npm run lint
          npm run validate
          npm run matrix:check
          node scripts/resolve-live-run-matrix.mjs

  live-run:
    needs: resolve-matrix
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.resolve-matrix.outputs.matrix) }}
    uses: Extra-Chill/homeboy-extensions/.github/workflows/datamachine-agent-ci.yml@179eedbeb1da7a0b7dfacd10a6010019fd62a68b # main
    with:
      bundle_path: bundles/datamachine-task-runner
      bundle_ref: ${{ inputs.bundle_ref }}
      bundle_validator_spec: bundle-validator.json
      agent_slug: wordpress-task-runner
      pipeline_slug: wordpress-task-runner-pipeline
      flow_slug: wordpress-task-runner-flow
      target_repo: Automattic/wp-gym
      prompt: ${{ matrix.prompt }}
      provider: ${{ matrix.provider }}
      model: ${{ matrix.model }}
      provider_plugin: ${{ matrix.provider_plugin }}
      success_requires_pr: ${{ matrix.success_requires_pr }}
      runner_workspace: ${{ matrix.runner_workspace }}
      pipeline_step_patches: ${{ matrix.pipeline_step_patches }}
      flow_step_patches: ${{ matrix.flow_step_patches }}
      enable_terminal_actions: ${{ matrix.enable_terminal_actions }}
      wp_cli_tool_name: ${{ matrix.wp_cli_tool_name }}
      artifact_export_config: ${{ matrix.artifact_export_config }}
      rules: ${{ matrix.rules }}
      general_rules: ${{ matrix.general_rules }}
      task_rules: ${{ matrix.task_rules }}
      probes: ${{ matrix.probes }}
      disable_datamachine_directives: true
      dry_run: ${{ inputs.dry_run }}
      max_turns: ${{ matrix.max_turns }}
      step_budget: ${{ matrix.step_budget }}
      time_budget_ms: ${{ matrix.time_budget_ms }}
      workload_run_after: ${{ matrix.workload_run_after }}
      engine_data_outputs: |
        {
          "task_id": "metadata.engine_data.task_id",
          "job_status": "metadata.job_status",
          "fingerprints": "metadata.fingerprints",
          "prompt_sha256": "metadata.fingerprints.prompt.sha256",
          "bundle_sha256": "metadata.fingerprints.bundle.sha256",
          "tool_policy_sha256": "metadata.fingerprints.tool_policy.sha256"
        }
      transcript_artifact_name: wp-gym-transcript-${{ matrix.artifact_suffix }}
      replay_bundle_artifact_name: wp-gym-replay-${{ matrix.artifact_suffix }}
    secrets:
      HOMEBOY_APP_ID: ${{ secrets.HOMEBOY_APP_ID }}
      HOMEBOY_APP_PRIVATE_KEY: ${{ secrets.HOMEBOY_APP_PRIVATE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PROVIDER_SECRET_1: ${{ secrets.ANTHROPIC_API_KEY }}

  emit-run-registry:
    needs: live-run
    if: ${{ always() && ! inputs.dry_run && needs.live-run.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install registry dependencies
        run: npm ci

      - name: Download live replay artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wp-gym-replay-*
          path: artifacts/live-replay-bundles

      - name: Emit and validate run registry
        run: |
          set -euo pipefail
          npm run run-registry:emit -- \
            --input artifacts/live-replay-bundles \
            --output artifacts/wp-gym-run-registry \
            --require-entry
          node scripts/validate-run-registry.mjs \
            --input artifacts/wp-gym-run-registry/entries \
            --regrade
          npm run run-registry:report -- \
            --registry artifacts/wp-gym-run-registry/entries \
            --regrade \
            --json artifacts/wp-gym-run-registry/report.json \
            --markdown artifacts/wp-gym-run-registry/report.md \
            --scope pilot \
            --large-n-min-attempts "${{ inputs.large_n_min_attempts }}"
          npm run run-registry:report -- \
            --registry artifacts/wp-gym-run-registry/entries \
            --json artifacts/wp-gym-run-registry/large-n-report.json \
            --markdown artifacts/wp-gym-run-registry/large-n-report.md \
            --scope all \
            --large-n-min-attempts "${{ inputs.large_n_min_attempts }}"

      - name: Upload run registry artifact
        uses: actions/upload-artifact@v7
        with:
          name: wp-gym-run-registry-${{ github.run_id }}
          path: |
            artifacts/wp-gym-run-registry
            artifacts/live-replay-bundles
          if-no-files-found: error
          retention-days: 90
