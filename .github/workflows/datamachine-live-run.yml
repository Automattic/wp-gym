name: Data Machine Live Task Run

on:
  workflow_dispatch:
    inputs:
      task_set:
        description: Task set to run when task_ids is empty.
        required: true
        default: first-live-run
        type: choice
        options:
          - first-live-run
          - smoke
          - all
          - custom
      task_ids:
        description: Optional comma-separated task IDs. Overrides task_set.
        required: false
        default: ""
        type: string
      bundle_ref:
        description: Optional wp-rl ref containing bundles/datamachine-task-runner.
        required: false
        default: ""
        type: string
      dry_run:
        description: Build the runner config without making live model calls.
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  resolve-tasks:
    runs-on: ubuntu-latest
    outputs:
      smoke: ${{ steps.tasks.outputs.smoke }}
      smoke_prompt: ${{ steps.tasks.outputs.smoke_prompt }}
      smoke_workload_run_after: ${{ steps.tasks.outputs.smoke_workload_run_after }}
      smoke_max_turns: ${{ steps.tasks.outputs.smoke_max_turns }}
      smoke_step_budget: ${{ steps.tasks.outputs.smoke_step_budget }}
      smoke_time_budget_ms: ${{ steps.tasks.outputs.smoke_time_budget_ms }}
      community_garden: ${{ steps.tasks.outputs.community_garden }}
      community_garden_prompt: ${{ steps.tasks.outputs.community_garden_prompt }}
      community_garden_workload_run_after: ${{ steps.tasks.outputs.community_garden_workload_run_after }}
      community_garden_max_turns: ${{ steps.tasks.outputs.community_garden_max_turns }}
      community_garden_step_budget: ${{ steps.tasks.outputs.community_garden_step_budget }}
      community_garden_time_budget_ms: ${{ steps.tasks.outputs.community_garden_time_budget_ms }}
      pricing_section: ${{ steps.tasks.outputs.pricing_section }}
      pricing_section_prompt: ${{ steps.tasks.outputs.pricing_section_prompt }}
      pricing_section_workload_run_after: ${{ steps.tasks.outputs.pricing_section_workload_run_after }}
      pricing_section_max_turns: ${{ steps.tasks.outputs.pricing_section_max_turns }}
      pricing_section_step_budget: ${{ steps.tasks.outputs.pricing_section_step_budget }}
      pricing_section_time_budget_ms: ${{ steps.tasks.outputs.pricing_section_time_budget_ms }}
      abilities_site_summary: ${{ steps.tasks.outputs.abilities_site_summary }}
      abilities_site_summary_prompt: ${{ steps.tasks.outputs.abilities_site_summary_prompt }}
      abilities_site_summary_workload_run_after: ${{ steps.tasks.outputs.abilities_site_summary_workload_run_after }}
      abilities_site_summary_max_turns: ${{ steps.tasks.outputs.abilities_site_summary_max_turns }}
      abilities_site_summary_step_budget: ${{ steps.tasks.outputs.abilities_site_summary_step_budget }}
      abilities_site_summary_time_budget_ms: ${{ steps.tasks.outputs.abilities_site_summary_time_budget_ms }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve selected tasks
        id: tasks
        env:
          TASK_SET: ${{ inputs.task_set }}
          TASK_IDS: ${{ inputs.task_ids }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const root = process.cwd();

          function readJson(file) {
            return JSON.parse(fs.readFileSync(path.join(root, file), 'utf8'));
          }

          function readText(file) {
            return fs.readFileSync(path.join(root, file), 'utf8').trim();
          }

          function resolveFrom(baseFile, candidate) {
            if (!candidate) {
              return '';
            }
            return path.normalize(path.join(path.dirname(baseFile), candidate)).replace(/\\/g, '/');
          }

          function output(name, value) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${name}<<EOF\n${value}\nEOF\n`);
          }

          function taskSetScenarioIds(taskSetFile) {
            const taskSet = readJson(taskSetFile);
            const ids = [];
            for (const scenarioFile of taskSet.scenario_manifests || []) {
              const scenarioPath = resolveFrom(taskSetFile, scenarioFile);
              const scenario = readJson(scenarioPath);
              ids.push(scenario.id);
            }
            for (const task of taskSet.tasks || []) {
              if (task.scenario_id && !ids.includes(task.scenario_id)) {
                ids.push(task.scenario_id);
              }
            }
            return ids;
          }

          const taskConfigs = [
            {
              key: 'smoke',
              id: 'smoke-homepage',
              promptFile: 'prompts/smoke-homepage.md',
              graderFile: 'checks/smoke-homepage.php',
              maxTurns: 8,
              stepBudget: 12,
              timeBudgetMs: 600000,
            },
            {
              key: 'community_garden',
              id: 'site-building-community-garden',
              scenarioFile: 'scenarios/site-building/community-garden.json',
            },
            {
              key: 'pricing_section',
              id: 'block-markup-no-fallback-pricing-section',
              scenarioFile: 'scenarios/block-markup/no-fallback-pricing-section.json',
            },
            {
              key: 'abilities_site_summary',
              id: 'modern-wordpress-api-abilities-site-summary',
              scenarioFile: 'scenarios/modern-wordpress-api/abilities-site-summary.json',
            },
          ].map((task) => {
            if (!task.scenarioFile) {
              return task;
            }
            const scenario = readJson(task.scenarioFile);
            return {
              ...task,
              promptFile: resolveFrom(task.scenarioFile, scenario.prompt_file || scenario.prompt),
              graderFile: resolveFrom(task.scenarioFile, scenario.grader_file || scenario.grader),
              maxTurns: Number(scenario.limits?.max_turns || 12),
              stepBudget: Number(scenario.limits?.step_budget || 16),
              timeBudgetMs: Number(scenario.limits?.time_budget_ms || 600000),
            };
          });

          const explicitIds = (process.env.TASK_IDS || '')
            .split(',')
            .map((id) => id.trim())
            .filter(Boolean);
          if (process.env.TASK_SET === 'custom' && explicitIds.length === 0) {
            throw new Error('task_ids is required when task_set is custom.');
          }
          const selectedIds = explicitIds.length > 0
            ? explicitIds
            : process.env.TASK_SET === 'all'
              ? taskConfigs.map((task) => task.id)
              : process.env.TASK_SET === 'smoke'
                ? ['smoke-homepage']
                : taskSetScenarioIds(`task-sets/${process.env.TASK_SET}.json`);

          for (const taskId of selectedIds) {
            if (!taskConfigs.some((task) => task.id === taskId)) {
              throw new Error(`This workflow does not have an explicit job for task ID: ${taskId}`);
            }
          }

          for (const task of taskConfigs) {
            const enabled = selectedIds.includes(task.id) ? 'true' : 'false';
            output(task.key, enabled);
            output(`${task.key}_prompt`, readText(task.promptFile));
            output(`${task.key}_workload_run_after`, JSON.stringify([{ type: 'php', file: task.graderFile }]));
            output(`${task.key}_max_turns`, String(task.maxTurns));
            output(`${task.key}_step_budget`, String(task.stepBudget));
            output(`${task.key}_time_budget_ms`, String(task.timeBudgetMs));
          }
          NODE

  smoke-openai:
    needs: resolve-tasks
    if: needs.resolve-tasks.outputs.smoke == 'true'
    uses: Extra-Chill/homeboy-extensions/.github/workflows/datamachine-agent-ci.yml@main
    with:
      bundle_path: bundles/datamachine-task-runner
      bundle_ref: ${{ inputs.bundle_ref }}
      bundle_validator_spec: bundle-validator.json
      agent_slug: wordpress-task-runner
      pipeline_slug: wordpress-task-runner-pipeline
      flow_slug: wordpress-task-runner-flow
      target_repo: chubes4/wp-rl
      prompt: ${{ needs.resolve-tasks.outputs.smoke_prompt }}
      provider: openai
      model: gpt-5.5
      success_requires_pr: false
      dry_run: ${{ inputs.dry_run }}
      max_turns: ${{ fromJson(needs.resolve-tasks.outputs.smoke_max_turns) }}
      step_budget: ${{ fromJson(needs.resolve-tasks.outputs.smoke_step_budget) }}
      time_budget_ms: ${{ fromJson(needs.resolve-tasks.outputs.smoke_time_budget_ms) }}
      workload_run_after: ${{ needs.resolve-tasks.outputs.smoke_workload_run_after }}
      engine_data_outputs: '{"task_id":"metadata.engine_data.task_id","job_status":"metadata.job_status"}'
      transcript_artifact_name: wp-rl-transcript-smoke-homepage-openai-gpt-5-5
      replay_bundle_artifact_name: wp-rl-replay-smoke-homepage-openai-gpt-5-5
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  smoke-anthropic:
    needs: resolve-tasks
    if: needs.resolve-tasks.outputs.smoke == 'true'
    uses: Extra-Chill/homeboy-extensions/.github/workflows/datamachine-agent-ci.yml@main
    with:
      bundle_path: bundles/datamachine-task-runner
      bundle_ref: ${{ inputs.bundle_ref }}
      bundle_validator_spec: bundle-validator.json
      agent_slug: wordpress-task-runner
      pipeline_slug: wordpress-task-runner-pipeline
      flow_slug: wordpress-task-runner-flow
      target_repo: chubes4/wp-rl
      prompt: ${{ needs.resolve-tasks.outputs.smoke_prompt }}
      provider: anthropic
      model: claude-opus-4-7
      provider_plugin: '{"repo":"WordPress/ai-provider-for-anthropic","ref":"trunk","path":".","register_function":"WordPress\\AnthropicAiProvider\\register_provider","credentials":{"connectors_ai_anthropic_api_key":"PROVIDER_SECRET_1"}}'
      success_requires_pr: false
      dry_run: ${{ inputs.dry_run }}
      max_turns: ${{ fromJson(needs.resolve-tasks.outputs.smoke_max_turns) }}
      step_budget: ${{ fromJson(needs.resolve-tasks.outputs.smoke_step_budget) }}
      time_budget_ms: ${{ fromJson(needs.resolve-tasks.outputs.smoke_time_budget_ms) }}
      workload_run_after: ${{ needs.resolve-tasks.outputs.smoke_workload_run_after }}
      engine_data_outputs: '{"task_id":"metadata.engine_data.task_id","job_status":"metadata.job_status"}'
      transcript_artifact_name: wp-rl-transcript-smoke-homepage-anthropic-claude-opus-4-7
      replay_bundle_artifact_name: wp-rl-replay-smoke-homepage-anthropic-claude-opus-4-7
    secrets:
      PROVIDER_SECRET_1: ${{ secrets.ANTHROPIC_API_KEY }}

