name: Benchmark Artifact Ops

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read

jobs:
  artifact-ops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate benchmark artifact operations
        run: |
          npm run benchmark-ops:validate
          npm run run-registry:emit:test
          npm run run-registry:validate
          npm run stability-budget:test
          npm run remote-archive:test
