name: Playground Smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Run Homeboy Playground smoke task
        uses: Extra-Chill/homeboy-action@42636bb42a936a11339ba8424c6589ea542a76e1 # v2.8.2
        env:
          HOMEBOY_PLAYGROUND_RESULTS_ARTIFACT_DIR: homeboy-ci-results
        with:
          component: wp-gym
          extension: wordpress
          extension-source: https://github.com/Extra-Chill/homeboy-extensions
          commands: bench
          iterations: 1
          args: --ignore-baseline --setting-json wp_codebox_scenario_manifests=[]

      - name: Upload task artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wp-gym-smoke-task
          path: |
            homeboy-ci-results/bench.json
            homeboy-ci-results/results.jsonl
            homeboy-ci-results/leaderboard.md
          if-no-files-found: warn
          retention-days: 30
